name: 🚌 Bus Booking CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop", "release/**" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:       # Allow manual trigger from GitHub UI

# Cancel any in-progress run for the same branch (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_DEFAULT_VERSION: "3.12"
  # Opt into Node.js 24 for all GitHub Actions (Node 20 deprecated June 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Code Quality ──────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_DEFAULT_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}
          cache: pip

      - name: 📦 Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: 🎨 Check formatting with Black
        run: black --check --diff .

      - name: 📐 Check import order with isort
        run: isort --check-only --diff .

      - name: 🔎 Lint with flake8
        run: |
          # Stop build on syntax errors / undefined names (E9, F63, F7, F82)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on all other issues but don't fail
          flake8 . --count --exit-zero --max-complexity=10 --statistics

  # ── 2. Test Matrix ───────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false          # Run all versions even if one fails
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: 🧪 Run tests with coverage
        run: pytest

      - name: 📊 Upload coverage report (XML)
        if: matrix.python-version == env.PYTHON_DEFAULT_VERSION
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

      - name: 📂 Upload HTML coverage report
        if: matrix.python-version == env.PYTHON_DEFAULT_VERSION
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 7

  # ── 3. Type Check ────────────────────────────────────────────────────────────
  type-check:
    name: 🔬 Type Check (mypy)
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_DEFAULT_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}
          cache: pip

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: 🔬 Run mypy
        run: mypy app/

  # ── 4. Security Scan ─────────────────────────────────────────────────────────
  security:
    name: 🔒 Security Scan (Bandit)
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_DEFAULT_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}
          cache: pip

      - name: 📦 Install Bandit
        run: pip install bandit

      - name: 🔒 Run Bandit security scan
        run: bandit -r app/ -ll -f txt

  # ── 5. Build Distribution Package ────────────────────────────────────────────
  build:
    name: 📦 Build Package
    needs: [test, type-check, security]
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_DEFAULT_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT_VERSION }}
          cache: pip

      - name: 📦 Install build tools
        run: pip install build

      - name: 🏗️ Build source & wheel distributions
        run: python -m build

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/
          retention-days: 30

  # ── 6. Deploy (only on push to main) ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    # Only deploy on push to main; skip for PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://bus-booking-staging.example.com

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ⬇️ Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-packages
          path: dist/

      - name: 🚀 Deploy to Staging
        run: |
          echo "✅ Deploying version ${{ github.sha }} to staging..."
          echo "📦 Artifacts:"
          ls -lh dist/
          # Replace this echo block with your real deploy commands, e.g.:
          # scp dist/*.whl user@staging-server:/app/
          # ssh user@staging-server "pip install /app/*.whl && systemctl restart bus-booking"
          echo "🎉 Deployment complete!"

      - name: 📣 Notify on success
        if: success()
        run: |
          echo "✅ Deployment to staging succeeded for commit ${{ github.sha }}"
          # Add Slack / email notification here if needed

      - name: ❌ Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed for commit ${{ github.sha }}"
